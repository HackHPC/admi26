- teamname: The Hacking Tribunal
  awards:
    - "🏆 Team Introductions Award"
  files: "teams/TheHackingTribunal"
  goal: "Develop an AI-assisted forecasting platform using encyclopedic biological knowledge to predict emerging concepts and innovation opportunities — building a biological knowledge graph, identifying historical patterns, detecting cross-discipline convergence, and generating evidence-based forecasts."
  research_question: "How can historical data and innovation trends in robotics be analyzed to accurately forecast future technological developments in the field?"
  milestones:
    - "M1: Foundation & repo setup (GitHub, Colab, shared config)"
    - "M2: Biological seed dataset creation"
    - "M3: Knowledge graph construction"
    - "M4: Historical evolution analysis"
    - "M5: Convergence detection system"
    - "M6: AI forecasting engine (RAG-based)"
    - "M7: Visualization & UX"
    - "M8: Final submission package (README, poster, notebooks, demo)"
