<div class="sponsors-bar">
  <p class="sponsors-bar-heading">Sponsors &amp; Partners</p>
  <div class="sponsors-logos">
    {% for sponsor in site.data.sponsors %}
    <div class="sponsor-card">
      <a href="{{ sponsor.url }}" target="_blank" rel="noopener" class="sponsor-card-link" title="{{ sponsor.name }}">
        <div class="sponsor-logo-wrap">
          <img src="{{ site.baseurl }}{{ sponsor.logo }}" alt="{{ sponsor.name }}" class="sponsor-logo" onerror="this.style.display='none'">
          <span class="sponsor-name-fallback">{{ sponsor.name }}</span>
        </div>
      </a>
      {% if sponsor.funding_agencies %}
      <div class="sponsor-grants">
        {% for agency in sponsor.funding_agencies %}
        <span class="sponsor-grant-badge" title="{{ agency.name }} &mdash; {{ agency.grant_number }}">
          <img src="{{ site.baseurl }}{{ agency.logo }}" alt="{{ agency.name }}" class="grant-logo" onerror="this.style.display='none'">
          {{ agency.label }}
        </span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</div>
